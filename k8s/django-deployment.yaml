apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-app
  namespace: jv-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django-app
  template:
    metadata:
      labels:
        app: django-app
    spec:
      containers:
        - name: django-app
          image: raykhan007/jv-web:latest
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: django-secret-key
            - name: DEBUG
              value: "False"
            - name: ALLOWED_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: allowed-hosts
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: db-password
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: MEDIA_ROOT
              value: /app/media
            - name: EMAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: email-host
            - name: EMAIL_PORT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: email-port
            - name: EMAIL_HOST_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: email-user
            - name: EMAIL_HOST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: email-password
            - name: DEFAULT_FROM_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: default-from-email
            - name: JUNTA_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: junta-email
          volumeMounts:
            - name: media
              mountPath: /app/media
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: django-media
