apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jv-web-ingress
  namespace: jv-web
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/limit-rps: "5"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - villasconcerocio.cl
        - www.villasconcerocio.cl
      secretName: jv-web-tls
  rules:
    - host: villasconcerocio.cl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: django-app
                port:
                  number: 8000
    - host: www.villasconcerocio.cl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: django-app
                port:
                  number: 8000
