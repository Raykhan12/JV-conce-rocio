{# Sub-template reutilizable — los widgets ya traen sus clases CSS desde forms.py #}
<div>
  <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1.5">
    {{ field.label }}{% if required %} <span class="text-red-400">*</span>{% endif %}
  </label>
  {{ field }}
  {% if field.errors %}
    <p class="text-red-500 text-xs mt-1.5 flex items-center gap-1">
      <svg class="w-3.5 h-3.5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
      {{ field.errors|join:", " }}
    </p>
  {% endif %}
</div>
