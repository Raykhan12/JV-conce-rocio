<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ingresar — Panel JJVV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'ui-sans-serif'] } } }
    }
  </script>
  {% load static %}
</head>
<body class="bg-slate-100 font-sans antialiased min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">

    <!-- Logo + título -->
    <div class="text-center mb-8">
      <a href="/" class="inline-block mb-4 hover:opacity-90 transition">
        <img src="{% static 'img/logo.png' %}" alt="JJVV Logo" class="w-20 h-20 rounded-2xl object-cover shadow-lg mx-auto">
      </a>
      <h1 class="text-2xl font-extrabold text-gray-900">Panel de Gestión</h1>
      <p class="text-gray-400 text-sm mt-1">Junta de Vecinos Villas Concepción-El Rocío</p>
    </div>

    <!-- Card del formulario -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-7">

      {% if error %}
        <div class="mb-5 flex items-center gap-2.5 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm">
          <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
          </svg>
          {{ error }}
        </div>
      {% endif %}

      <form method="post" class="space-y-4">
        {% csrf_token %}
        {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

        <div>
          <label for="username" class="block text-sm font-semibold text-gray-700 mb-1.5">
            Usuario
          </label>
          <input type="text" id="username" name="username" required autofocus
                 autocomplete="username"
                 class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition placeholder-gray-300"
                 placeholder="Nombre de usuario">
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">
            Contraseña
          </label>
          <input type="password" id="password" name="password" required
                 autocomplete="current-password"
                 class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition placeholder-gray-300"
                 placeholder="••••••••">
        </div>

        <button type="submit"
                class="w-full bg-green-700 hover:bg-green-800 active:bg-green-900 text-white font-semibold py-3 rounded-xl transition shadow-sm text-sm mt-2">
          Ingresar al panel
        </button>
      </form>
    </div>

    <!-- Link volver -->
    <p class="text-center mt-5 text-xs text-gray-400">
      <a href="/" class="hover:text-gray-600 transition">← Volver al sitio público</a>
    </p>

  </div>

</body>
</html>
